- path: "run.runner.test.evaluator.pipeline.motion_compensation"
  value:
    enabled: true
    geometric_compensation_enabled: true
    foreground_correction_enabled: false
    confidence_threshold: 0.35
    ransac_reproj_threshold: 2.0
    min_matches: 8
    max_matches: 80
    min_inlier_ratio: 0.25
    orb_features: 800
    max_center_shift_ratio: 1.0
    lk_fallback_enabled: false
    mog2_history: 80
    mog2_var_threshold: 24.0
    mog2_detect_shadows: true
    morph_kernel_size: 3
    morph_iterations: 1
    min_candidate_area: 4.0
    min_candidate_area_ratio: 0.05
    max_candidate_area_ratio: 25.0
    candidate_score_threshold: 0.1
    print_summary: true
- path: "run.data.eval.transform.with_full_template_image"
  value: true
- path: "logging.tags"
  action: "append"
  value: "ctr"
- path: "name"
  action: "append"
  value: "-ctr"
